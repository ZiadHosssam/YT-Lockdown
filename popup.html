<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Lockdown</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: Consolas, Monaco, 'Courier New', monospace;
      overflow: hidden;
    }

    .header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 20px;
      height: 20px;
      background: #ff0000;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      position: relative;
      flex-shrink: 0;
    }

    .logo::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 4px 0 4px 7px;
      border-color: transparent transparent transparent #0a0a0a;
    }

    h1 {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
    }

    .status-area {
      padding: 16px 20px;
      border-bottom: 1px solid #1a1a1a;
    }

    .status-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .status-text {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    .status-text.active {
      color: #ff4444;
    }

    .status-text.idle {
      color: #555;
    }

    .video-title {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .controls {
      padding: 16px 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-family: Consolas, Monaco, 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .dev-info {
      padding: 10px 20px 14px;
      border-top: 1px solid #1a1a1a;
      font-size: 9px;
      line-height: 1.7;
      letter-spacing: 0.04em;
      color: #444;
    }

    .dev-info strong {
      color: #666;
      font-weight: 700;
    }

    .dev-info a {
      color: #777;
      text-decoration: none;
      border-bottom: 1px dotted #333;
    }

    .dev-info a:hover {
      color: #aaa;
      border-bottom-color: #777;
    }

    #lockBtn {
      background: #ff0000;
      color: #fff;
    }

    #lockBtn:hover {
      background: #cc0000;
    }

    #lockBtn:disabled {
      background: #2a0000;
      color: #550000;
      cursor: not-allowed;
    }

    #unlockBtn {
      background: transparent;
      color: #555;
      border: 1px solid #2a2a2a;
      margin-top: 8px;
    }

    #unlockBtn:hover {
      color: #888;
      border-color: #444;
    }

    #unlockBtn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .warning {
      padding: 10px 20px 16px;
      font-size: 9px;
      color: #333;
      line-height: 1.6;
      letter-spacing: 0.05em;
    }

    .warning span {
      color: #555;
    }

    .not-youtube {
      padding: 20px;
      font-size: 10px;
      color: #444;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    #mainUI { display: none; }
    #notYT { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo"></div>
  <h1>YT Lockdown</h1>
</div>

<div id="notYT" class="not-youtube">
  Open a YouTube<br/>video to activate.
</div>

<div id="mainUI">
  <div class="status-area">
    <div class="status-label">Status</div>
    <div id="statusText" class="status-text idle">Standby</div>
    <div id="videoTitle" class="video-title"></div>
  </div>

  <div class="controls">
    <button id="lockBtn">⬛ Engage Lockdown</button>
    <button id="unlockBtn" disabled>↩ Force Unlock</button>
  </div>

  <div class="warning">
    <span>Lockdown hides all distractions and traps you in the video until it ends.</span>
  </div>
</div>

<div class="dev-info">
  <div><strong>Developer:</strong> Ziad Hossam</div>
  <div><a href="https://ziad-hossam.vercel.app" target="_blank" rel="noopener noreferrer">ziad-hossam.vercel.app</a></div>
  <div><a href="mailto:ziad.h.ramadona@gmail.com">ziad.h.ramadona@gmail.com</a></div>
</div>

<script src="popup.js"></script>
</body>
</html>
